<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Poetry Showcase</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Reality, a colorful illusion</h1>
    <p>A journey through reality and illusions.</p>
    <nav>
      <a href="#poems">Poems</a>
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <main>
    <section id="poems"></section>

    <section id="about">
      <h2>About</h2>
      <p>Minimalist poetry site — words first, design second.</p>
    </section>

    <section id="contact">
      <h2>Contact</h2>
      <p>Email: poet@example.com</p>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 My Poetry Showcase</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const container = document.getElementById('poems');

    function stripYaml(text) {
      if (text.startsWith('---')) {
        const parts = text.split('---');
        if (parts.length >= 3) {
          return parts.slice(2).join('---').trim();
        }
      }
      return text;
    }

    fetch('poems.json')
      .then(res => res.json())
      .then(poems => {
        poems.forEach(poem => {
          fetch(poem.file)
            .then(res => res.text())
            .then(text => {
              const cleanText = stripYaml(text);
              const poemDiv = document.createElement('div');
              poemDiv.className = 'poem';

              const theme = document.createElement('span');
              theme.className = 'theme';
              theme.textContent = poem.theme || "Theme: Reflection";

              const content = document.createElement('div');
              content.innerHTML = marked.parse(cleanText);

              poemDiv.appendChild(theme);
              poemDiv.appendChild(content);
              container.appendChild(poemDiv);
            });
        });
      })
      .catch(err => console.error('Error loading poems:', err));
  </script>
</body>
</html>
